version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline123
      POSTGRES_DB: pipeline_db
    ports:
      - '5236:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pipeline -d pipeline_db']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://pipeline:pipeline123@postgres:5432/pipeline_db
      PORT: 3001
      # Replace with your webhook.site URL for testing acceptance webhooks
      WEBHOOK_URL: https://webhook.site/318dfc8d-cebf-4376-b49c-a38021c5d86e
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3001
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres_data:
